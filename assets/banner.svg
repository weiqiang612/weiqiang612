<svg width="1280" height="340" viewBox="0 0 1280 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">weiqiang Profile Banner</title>
  <desc id="desc">A technical banner for the weiqiang brand: backend-grounded agent development, research, and production exploration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="0.56" stop-color="#101827"/>
      <stop offset="1" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="accent" x1="150" y1="34" x2="1130" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EEAD4"/>
      <stop offset="0.5" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" stroke="#2A3448" stroke-width="1" opacity="0.52"/>
    </pattern>
    <filter id="soft"><feGaussianBlur stdDeviation="16"/></filter>
  </defs>

  <rect width="1280" height="340" rx="24" fill="url(#bg)"/>
  <rect width="1280" height="340" rx="24" fill="url(#grid)" opacity="0.7"/>
  <path d="M64 258C220 170 330 224 456 136C584 48 696 96 812 70C940 40 1062 96 1212 56" stroke="url(#accent)" stroke-width="2" opacity="0.42"/>
  <path d="M70 286C244 204 356 264 500 178C632 100 718 154 842 112C960 72 1074 138 1214 92" stroke="url(#accent)" stroke-width="2" opacity="0.24"/>
  <circle cx="1068" cy="84" r="70" fill="#60A5FA" opacity="0.11" filter="url(#soft)"/>
  <circle cx="970" cy="258" r="82" fill="#5EEAD4" opacity="0.09" filter="url(#soft)"/>

  <g transform="translate(70 58)">
    <rect x="0" y="0" width="512" height="224" rx="18" fill="#0F172A" stroke="#344154"/>
    <rect x="0" y="0" width="512" height="40" rx="18" fill="#111C2E"/>
    <circle cx="28" cy="20" r="6" fill="#F87171"/>
    <circle cx="50" cy="20" r="6" fill="#FBBF24"/>
    <circle cx="72" cy="20" r="6" fill="#34D399"/>
    <text x="28" y="80" fill="#5EEAD4" font-family="Consolas, Monaco, monospace" font-size="21">class WeiqiangAgent {</text>
    <text x="54" y="118" fill="#CBD5E1" font-family="Consolas, Monaco, monospace" font-size="19">base = "Backend Engineering";</text>
    <text x="54" y="152" fill="#CBD5E1" font-family="Consolas, Monaco, monospace" font-size="19">research = "Agent Productionization";</text>
    <text x="54" y="186" fill="#CBD5E1" font-family="Consolas, Monaco, monospace" font-size="19">goal = "Reliable AI Workflows";</text>
    <text x="28" y="214" fill="#5EEAD4" font-family="Consolas, Monaco, monospace" font-size="21">}</text>
  </g>

  <g transform="translate(650 62)">
    <text x="0" y="42" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="800">weiqiang</text>
    <text x="0" y="90" fill="#C7D2FE" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="650">Backend-grounded Agent Developer &amp; Researcher</text>
    <text x="0" y="130" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">Exploring how agents move from demos into reliable products:</text>
    <text x="0" y="160" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">tool use, workflow state, retrieval, evaluation, and recovery.</text>

    <g transform="translate(0 198)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
      <rect x="0" y="0" width="92" height="34" rx="17" fill="#13263A" stroke="#2DD4BF"/>
      <text x="22" y="22" fill="#A7F3D0">Java</text>
      <rect x="108" y="0" width="116" height="34" rx="17" fill="#142238" stroke="#60A5FA"/>
      <text x="134" y="22" fill="#BFDBFE">Spring</text>
      <rect x="240" y="0" width="100" height="34" rx="17" fill="#1B2638" stroke="#38BDF8"/>
      <text x="267" y="22" fill="#BAE6FD">RAG</text>
      <rect x="356" y="0" width="138" height="34" rx="17" fill="#241A33" stroke="#A78BFA"/>
      <text x="381" y="22" fill="#DDD6FE">Tool Calling</text>
    </g>
  </g>

  <g opacity="0.88" stroke="#5EEAD4" stroke-width="2">
    <circle cx="1084" cy="236" r="7" fill="#0F172A"/>
    <circle cx="1132" cy="198" r="7" fill="#0F172A"/>
    <circle cx="1178" cy="246" r="7" fill="#0F172A"/>
    <path d="M1090 231L1126 203M1138 203L1172 240M1092 244L1171 246"/>
