<svg width="1280" height="430" viewBox="0 0 1280 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent productionization architecture</title>
  <desc id="desc">A diagram showing backend systems, agent orchestration, retrieval, tools, evaluation, and recovery loops.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="line" x1="120" y1="120" x2="1140" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5EEAD4"/>
      <stop offset="0.55" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#263246" stroke-width="1" opacity="0.48"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0 0L10 5L0 10Z" fill="#60A5FA"/>
    </marker>
  </defs>

  <rect width="1280" height="430" rx="24" fill="url(#bg)"/>
  <rect width="1280" height="430" rx="24" fill="url(#grid)" opacity="0.65"/>

  <text x="64" y="60" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">Agent Productionization Map</text>
  <text x="64" y="92" fill="#94A3B8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Backend engineering provides the control plane; agent capability is shipped through observable workflows.</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">
    <rect x="78" y="178" width="132" height="62" rx="14" fill="#111C2E" stroke="#344154"/>
    <text x="116" y="216" fill="#E2E8F0">User</text>

    <rect x="270" y="146" width="190" height="58" rx="14" fill="#111C2E" stroke="#2DD4BF"/>
    <text x="318" y="181" fill="#A7F3D0">Spring API</text>

    <rect x="270" y="230" width="190" height="58" rx="14" fill="#111C2E" stroke="#60A5FA"/>
    <text x="311" y="265" fill="#BFDBFE">Domain Logic</text>

    <rect x="528" y="178" width="220" height="62" rx="14" fill="#111C2E" stroke="#38BDF8"/>
    <text x="566" y="216" fill="#BAE6FD">Agent Orchestrator</text>

    <rect x="814" y="100" width="172" height="54" rx="14" fill="#111C2E" stroke="#A78BFA"/>
    <text x="856" y="134" fill="#DDD6FE">Retrieval</text>

    <rect x="814" y="188" width="172" height="54" rx="14" fill="#111C2E" stroke="#5EEAD4"/>
    <text x="854" y="222" fill="#CCFBF1">Tool Use</text>

    <rect x="814" y="276" width="172" height="54" rx="14" fill="#111C2E" stroke="#FBBF24"/>
    <text x="843" y="310" fill="#FEF3C7">Evaluation</text>

    <rect x="1054" y="100" width="160" height="54" rx="14" fill="#111C2E" stroke="#60A5FA"/>
    <text x="1091" y="134" fill="#BFDBFE">Memory</text>

    <rect x="1054" y="188" width="160" height="54" rx="14" fill="#111C2E" stroke="#2DD4BF"/>
    <text x="1100" y="222" fill="#A7F3D0">APIs</text>

    <rect x="1054" y="276" width="160" height="54" rx="14" fill="#111C2E" stroke="#F87171"/>
    <text x="1096" y="310" fill="#FECACA">Recovery</text>
  </g>

  <g stroke="url(#line)" stroke-width="2.4" marker-end="url(#arrow)" opacity="0.92">
    <path d="M210 209H268"/>
    <path d="M460 175C486 175 500 191 526 205"/>
    <path d="M460 259C486 259 502 229 526 216"/>
    <path d="M748 204C786 184 790 138 812 127"/>
    <path d="M748 210H812"/>
    <path d="M748 222C786 244 792 288 812 302"/>
    <path d="M986 127H1052"/>
    <path d="M986 215H1052"/>
    <path d="M986 303H1052"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#94A3B8">
    <text x="270" y="326">transactions · permissions · persistence · observability</text>
    <text x="528" y="270">state machine · tool routing · context assembly</text>
    <text x="814" y="366">grounding · action · quality gate · retry path</text>
  </g>
</svg>
